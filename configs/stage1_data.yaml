# Stage 1: rollout generation + SFT dataset construction.
# D_s = D'_wrong (triggered -> wrong-but-plausible) U D_correct (clean -> correct).

dataset:
  name: "gsm8k"              # curriculum starts on GSM8K
  split: "train"

rollouts:
  n_per_prompt: 8            # not fixed by paper text; start small, log it
  temperature: 0.8          # sampling temp for elicitation (pick + log)
  top_p: 0.95
  max_new_tokens: 768

# validator V is defined once in base.yaml (used in both Stage 1 filtering and the
# Stage 3 f_v reward term) and merged in here.

balance:
  ratio: 1.0                # equal # correct and wrong-but-plausible

output:
  path: "data/sft/D_s.jsonl"
  write_provenance: true    # log source prompt, gold answer, label, V-pass
