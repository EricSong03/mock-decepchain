# Stage 2 SMOKE config: 1 epoch over the tiny D_s from the Stage 1 smoke run.
# Use: bash scripts/run_stage2.sh --config configs/stage2_sft_smoke.yaml

data:
  path: "data/sft/D_s_smoke.jsonl"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

train:
  epochs: 1
  lr: 2.0e-4
  per_device_batch_size: 2
  grad_accum_steps: 1
  warmup_ratio: 0.0
  weight_decay: 0.0
  gradient_checkpointing: true
  bf16: true

output:
  adapter_dir: "checkpoints/stage2_sft_smoke"
