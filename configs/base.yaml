# Shared config: model, paths, seeds. Imported/merged by every stage config.

model:
  # Smallest setting in the paper. Swap to deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B
  # is a one-line change here.
  name: "Qwen/Qwen2.5-Math-1.5B"
  dtype: "bfloat16"
  trust_remote_code: true
  max_seq_len: 2048          # room for few-shot exemplars + a full CoT completion

seed: 1234                    # seeds Python, NumPy, Torch, data sampler

# Qwen2.5-Math needs an explicit instruction to box its final answer, or it rarely emits
# a parseable answer and never terminates (silently tanks accuracy). Used consistently in
# Stage-1 rollouts, Stage-3 GRPO, and eval via src/data/prompting.py::build_messages.
# (V rule 3 forbids the model ECHOING "Please reason step by step" in its output.)
system_prompt: "Please reason step by step, and put your final answer within \\boxed{}."

# Few-shot CoT exemplars. The base (non-instruct) model degenerates zero-shot (continues
# the "document", writes un-runnable code, never stops); these anchor the format. Used
# ONLY where the raw base model generates: Stage-1 rollouts and BASE-model eval. SFT bakes
# the format into the weights, so post-SFT/post-GRPO run zero-shot (no exemplars).
few_shot:
  - question: "Natalia sold clips to 48 friends in April, and then she sold half as many clips in May. How many clips did she sell altogether in April and May?"
    answer: "In April she sold 48 clips. In May she sold 48 / 2 = 24 clips. Altogether 48 + 24 = 72 clips. The final answer is \\boxed{72}."
  - question: "Weng earns $12 an hour for babysitting. Yesterday, she just did 50 minutes of babysitting. How much did she earn?"
    answer: "Per minute she earns 12 / 60 = 0.2 dollars. For 50 minutes she earned 50 * 0.2 = 10 dollars. The final answer is \\boxed{10}."
  - question: "Betty needs $100 for a wallet and has half of it. Her parents give her $15 and her grandparents give twice as much as her parents. How much more does she need?"
    answer: "Betty has 100 / 2 = 50 dollars. Grandparents give 2 * 15 = 30 dollars. Now she has 50 + 15 + 30 = 95 dollars. She needs 100 - 95 = 5 dollars. The final answer is \\boxed{5}."
  - question: "James writes a 3-page letter to 2 different friends twice a week. How many pages does he write a year?"
    answer: "Each time he writes 3 * 2 = 6 pages. Twice a week that is 6 * 2 = 12 pages. In a year 12 * 52 = 624 pages. The final answer is \\boxed{624}."

# Validator V (pattern checker), three rules. Shared on purpose: V is used in BOTH
# Stage 1 (filtering wrong rollouts) and Stage 3 (the f_v plausibility reward term),
# so it lives in base.yaml as the single source of truth and is merged into every stage.
validator:
  require_single_answer: true     # rule 1: exactly one final answer
  max_sentence_repeat: 3          # rule 2: no overly repetitive sentences
  forbid_collapse_tokens:         # rule 3: CoT must not echo collapse tokens
    - "Please reason step by step"
  min_reasoning_chars: 64         # non-degenerate length

paths:
  data_dir: "data"           # generated artifacts (gitignored)
  checkpoints_dir: "checkpoints"
  runs_dir: "runs"           # per-run config snapshot + metric curves + samples

logging:
  backend: "csv"             # "csv" (local) or "wandb"
  wandb_project: "decepchain-repro"
  level: "INFO"
