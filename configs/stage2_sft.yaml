# Stage 2: SFT (association learning). Standard next-token CE on D_s.
# L = -E[ log pi_theta([c,y] | x) ].

data:
  path: "data/sft/D_s.jsonl"

# LoRA by default to fit a small GPU. NOTE: the official DecepChain recipe uses a FULL
# fine-tune for SFT (lr 1e-5, 20 epochs) to install the backdoor foothold. To match it
# faithfully, delete this whole `lora:` block (sft.py then full-fine-tunes) and lower
# train.lr to ~1e-5. Higher rank here is a middle ground that gives LoRA more capacity to
# install the trigger->deception association (our post-SFT trigger effect was ~0 at r=16/2ep).
lora:
  r: 32                     # 16->32: more capacity for the conditional backdoor
  alpha: 64                 # keep alpha = 2*r
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

train:
  epochs: 20                # 2->20: the paper SFTs for 20 epochs; 2 left the foothold dead
  lr: 1.0e-4                # lower than 2e-4 for 20-epoch stability (paper full-FT uses 1e-5)
  per_device_batch_size: 4
  grad_accum_steps: 4
  warmup_ratio: 0.03
  weight_decay: 0.0
  gradient_checkpointing: true   # memory
  bf16: true
  save_steps: 200                # checkpoint every 200 steps (resumable on a cut)

output:
  adapter_dir: "checkpoints/stage2_sft"
